name: BIST Saatlik Rapor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  rapor-gonder:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri kur
        run: pip install yfinance pandas anthropic

      - name: Raporu çalıştır
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADRES: ${{ secrets.GMAIL_ADRES }}
          GMAIL_UYGULAMA_SIFRE: ${{ secrets.GMAIL_UYGULAMA_SIFRE }}
          ALICI_MAIL: ${{ secrets.ALICI_MAIL }}
        run: python saatlik_rapor.py
